spring.application.name=lostandfound

# H2 Database
# JDBC URL to use in H2 Console: jdbc:h2:mem:lostfounddb
spring.datasource.url=jdbc:h2:mem:lostfounddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console - access at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT
app.jwt.secret=SrmApLostAndFoundSecretKeyForJwtTokenGeneration2024VeryLongSecretKey
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Server
server.port=8080
